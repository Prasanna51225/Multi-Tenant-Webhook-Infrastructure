apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-config
  namespace: webhook-platform
data:
  HTTP_PORT: "8080"
  GRPC_PORT: "50051"
  DB_URL: "postgres://webhook:webhook@postgres:5432/webhook?sslmode=disable"
  REDIS_URL: "redis://redis:6379"
  KAFKA_BROKERS: "kafka:9092"
  OTLP_ENDPOINT: "jaeger:4317"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"