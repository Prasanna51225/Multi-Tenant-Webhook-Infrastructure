apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: webhook-platform
  labels:
    app: scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: webhook-platform/scheduler:latest
          envFrom:
            - configMapRef:
                name: webhook-config
          env:
            - name: SERVICE_NAME
              value: "webhook-scheduler"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi