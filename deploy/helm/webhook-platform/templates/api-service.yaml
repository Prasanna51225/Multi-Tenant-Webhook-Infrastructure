apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
    {{- include "webhook-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - name: http
      port: {{ .Values.service.api.httpPort }}
      targetPort: 8080
    - name: grpc
      port: {{ .Values.service.api.grpcPort }}
      targetPort: 50051
  selector:
    app: api