name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download dependencies
        run: go mod download
      - name: Verify modules
        run: go mod verify
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: webhook
          POSTGRES_PASSWORD: webhook
          POSTGRES_DB: webhook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download dependencies
        run: go mod download
      - name: Run migrations
        run: go run ./cmd/migrate -direction up -db-url "postgres://webhook:webhook@localhost:5432/webhook_test?sslmode=disable"
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.txt ./...
        env:
          DB_URL: "postgres://webhook:webhook@localhost:5432/webhook_test?sslmode=disable"
          REDIS_URL: "localhost:6379"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download dependencies
        run: go mod download
      - name: Build all binaries
        run: |
          CGO_ENABLED=0 GOOS=linux go build -o bin/api ./cmd/api
          CGO_ENABLED=0 GOOS=linux go build -o bin/dispatcher ./cmd/dispatcher
          CGO_ENABLED=0 GOOS=linux go build -o bin/scheduler ./cmd/scheduler
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/