name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.SHA_SHORT }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build and push Dispatcher
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.dispatcher
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dispatcher:${{ steps.meta.outputs.SHA_SHORT }}
            ghcr.io/${{ github.repository }}/dispatcher:latest

      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.scheduler
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/scheduler:${{ steps.meta.outputs.SHA_SHORT }}
            ghcr.io/${{ github.repository }}/scheduler:latest